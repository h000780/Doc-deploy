name: Deploy Main Site

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: |
          bun run build
          cp dist/index.html dist/404.html

      - name: Deploy Main Site
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: .
          clean-exclude: |-
            api-dev-manual
            app-architecture
