name: Deploy API Manual

on:
  push:
    branches: ["main"]
    paths:
      - "api-development-manual/**"
  workflow_dispatch:

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: cd api-development-manual && pnpm install --no-frozen-lockfile

      - name: Build
        run: cd api-development-manual && pnpm run build

      - name: Deploy API Manual
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: api-development-manual/out
          target-folder: api-dev-manual
          clean: false
